name: GitHub Actions Security Analysis with zizmor

on:
  pull_request:
  workflow_dispatch:
  push:
    branches:
      - main

permissions: {}

jobs:
  lint-workflows:
    name: Lint GitHub workflows
    runs-on: ubuntu-24.04 # pinned for determinism
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d
        with:
          advanced-security: false
          min-severity: medium
          min-confidence: medium

      - name: Validate workflows and actions
        uses: mpalmer/action-validator@c994f427b7c42cd5ecb1bc9315cb91c3d7d72e3d # v0.9.0
        with:
          version: 0.9.0
